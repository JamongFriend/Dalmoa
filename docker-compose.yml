services:
  db:
    image: mysql:8.0
    container_name: dalmoa-db
    restart: always
    environment:
      MYSQL_DATABASE: dalmoa
      MYSQL_ROOT_PASSWORD: klgh83492761!
      MYSQL_USER: dalmoa
      MYSQL_PASSWORD: klgh83492761!
    volumes:
      - ./mysql_data:/var/lib/mysql

  app:
    build: .
    container_name: dalmoa-backend
    restart: always
    environment:
      DB_URL: jdbc:mysql://db:3306/dalmoa?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
      DB_USERNAME: dalmoa
      DB_PASSWORD: klgh83492761!
      JWT_SECRET: Dalmoa_Secure_Random_Jwt_Secret_Key_Minimum_32_Characters_Required_1234567890
      EXCHANGE_API_KEY: f66ed6be838bafc18ab66d67
    depends_on:
      - db

  nginx:
    image: nginx:latest
    container_name: dalmoa-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    depends_on:
      - app

  certbot:
    image: certbot/certbot
    container_name: dalmoa-certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
