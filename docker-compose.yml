services:
  db:
    image: mysql:8.0
    container_name: dalmoa-db
    restart: always
    environment:
      MYSQL_DATABASE: dalmoa
      MYSQL_ROOT_PASSWORD: klgh83492761!
      MYSQL_USER: dalmoa
      MYSQL_PASSWORD: klgh83492761!
    ports:
      - "3306:3306"
    volumes:
      - ./mysql_data:/var/lib/mysql

  app:
    build: .
    container_name: dalmoa-backend
    restart: always
    ports:
      - "8080:8080"
    environment:
      # DB_URL의 localhost를 db(서비스명)로 바꿔서 컨테이너끼리 통신하게 함
      DB_URL: jdbc:mysql://db:3306/dalmoa?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
      DB_USERNAME: dalmoa
      DB_PASSWORD: klgh83492761!
      JWT_SECRET: Dalmoa_Secure_Random_Jwt_Secret_Key_Minimum_32_Characters_Required_1234567890
      EXCHANGE_API_KEY: f66ed6be838bafc18ab66d67
    depends_on:
      - db
