server {
    listen 80;
    server_name dalmoa.duckdns.org;

    # Certbot 인증을 위한 경로
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # 모든 HTTP 요청을 HTTPS로 리다이렉트 (인증서 발급 후 활성화 권장)
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name dalmoa.duckdns.org;

    # 인증서 경로 (Let's Encrypt 발급 경로)
    ssl_certificate /etc/letsencrypt/live/dalmoa.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dalmoa.duckdns.org/privkey.pem;

    # 보안 설정
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    location / {
        proxy_pass http://app:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
