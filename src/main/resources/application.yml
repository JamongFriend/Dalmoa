spring:
  application:
    name: Dalmoa

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL:jdbc:mysql://localhost:3306/dalmoa?serverTimezone=Asia/Seoul&characterEncoding=UTF-8}
    username: ${DB_USERNAME:dalmoa}
    password: ${DB_PASSWORD:83492761}

  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.dialect.MySQLDialect

jwt:
  secret: ${JWT_SECRET:your-very-secure-and-long-default-secret-key-32chars-minimum}
  issuer: dalmoa-backend
  access-token-exp-minutes: 30
  refresh-token-exp-days: 30

exchange:
  api:
    key: ${EXCHANGE_API_KEY:YOUR_API_KEY}
    base-url: https://v6.exchangerate-api.com/v6/
